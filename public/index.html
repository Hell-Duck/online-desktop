<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Онлайн-доска</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f0f2f5; }

    /* ---- Экран входа ---- */
    #lobby {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #f0f2f5; z-index: 100;
    }
    .card {
      background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 340px; text-align: center;
    }
    .card h1 { font-size: 20px; margin: 0 0 20px; }
    .card input {
      width: 100%; padding: 10px 12px; font-size: 15px; border: 1px solid #d0d4db;
      border-radius: 8px; margin-bottom: 12px;
    }
    .card button {
      width: 100%; padding: 10px; font-size: 15px; border: none; border-radius: 8px;
      background: #2563eb; color: #fff; cursor: pointer; margin-bottom: 8px;
    }
    .card button.secondary { background: #e5e7eb; color: #111; }
    .card .hint { font-size: 13px; color: #6b7280; margin-top: 4px; }

    /* ---- Доска ---- */
    #toolbar {
      display: none; position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: #fff; border-bottom: 1px solid #e5e7eb; align-items: center;
      gap: 6px; padding: 0 12px; z-index: 10;
    }
    #toolbar button {
      border: 1px solid #d0d4db; background: #fff; border-radius: 8px; padding: 6px 10px;
      cursor: pointer; font-size: 14px;
    }
    #toolbar button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    #toolbar .sep { width: 1px; height: 28px; background: #e5e7eb; margin: 0 4px; }
    #toolbar input[type=color] { width: 34px; height: 34px; border: none; background: none; cursor: pointer; }
    #toolbar select { border: 1px solid #d0d4db; background: #fff; border-radius: 8px; padding: 6px 8px; font-size: 14px; cursor: pointer; }
    #thicknessWrap { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #6b7280; }
    #thicknessWrap input[type=range] { width: 90px; cursor: pointer; }
    #thicknessWrap span { width: 20px; text-align: right; color: #111; }
    #thicknessWrap.disabled { opacity: .4; pointer-events: none; }

    /* Контекстное меню текста */
    #textToolbar {
      display: none; position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.1);
      padding: 6px 10px; gap: 8px; align-items: center; z-index: 20; font-size: 14px;
    }
    #textToolbar label { display: flex; align-items: center; gap: 4px; color: #6b7280; }
    #textToolbar input[type=number] { width: 56px; padding: 4px 6px; border: 1px solid #d0d4db; border-radius: 6px; font-size: 14px; }
    #textToolbar button.fmt { width: 32px; height: 32px; border: 1px solid #d0d4db; background: #fff; border-radius: 6px; cursor: pointer; font-size: 15px; }
    #textToolbar button.fmt.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    #toolbar .room-info { margin-left: auto; font-size: 13px; color: #6b7280; }
    #toolbar .room-info b { color: #111; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="lobby">
    <div class="card">
      <h1>Онлайн-доска</h1>
      <input id="roomInput" placeholder="Код комнаты" />
      <button id="joinBtn">Войти в комнату</button>
      <button id="createBtn" class="secondary">Создать новую</button>
      <div class="hint">Поделитесь кодом или ссылкой со вторым участником</div>
    </div>
  </div>

  <div id="toolbar">
    <button data-tool="select" class="active" title="Выделение объектов">⬚</button>
    <button data-tool="pan" title="Двигать полотно (или зажми пробел)">✋</button>
    <button data-tool="pen" title="Карандаш">✏️</button>
    <button data-tool="text" title="Текст">T</button>
    <button data-tool="rect" title="Прямоугольник">▭</button>
    <button data-tool="circle" title="Круг">◯</button>
    <button data-tool="line" title="Линия">╱</button>
    <button data-tool="eraser" title="Стёрка — стирает всё">🧽</button>
    <button data-tool="eraser-soft" title="Стёрка — не трогает вставленные картинки">🧽🛡</button>
    <div class="sep"></div>
    <select id="sheet" title="Вид листа">
      <option value="white">Белый</option>
      <option value="ruled">Линейка</option>
      <option value="grid">Клетка</option>
    </select>
    <div class="sep"></div>
    <input type="color" id="color" value="#222222" title="Цвет" />
    <label id="thicknessWrap" title="Толщина (карандаш / стёрки / фигуры)">
      <input type="range" id="thickness" min="1" max="40" value="3" />
      <span id="thicknessVal">3</span>
    </label>
    <button id="imageBtn" title="Вставить картинку">🖼 Картинка</button>
    <button id="deleteBtn" title="Удалить выбранное">🗑</button>
    <button id="resetViewBtn" title="Сбросить масштаб и позицию">⤢ Вид</button>
    <button id="clearBtn" title="Очистить доску">Очистить</button>
    <input type="file" id="imageInput" accept="image/*" style="display:none" />
    <div class="room-info">Комната: <b id="roomLabel"></b> · участников: <span id="peerCount">1</span></div>
  </div>

  <!-- Контекстное меню текста: показывается только при работе с текстом -->
  <div id="textToolbar">
    <label>Размер <input type="number" id="fontSize" min="8" max="200" value="22" /></label>
    <button id="boldBtn" class="fmt" title="Жирный" style="font-weight:700">Ж</button>
    <button id="italicBtn" class="fmt" title="Курсив" style="font-style:italic">К</button>
    <button id="underlineBtn" class="fmt" title="Подчёркнутый" style="text-decoration:underline">Ч</button>
  </div>

  <canvas id="board"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <script src="/fabric-eraser.js"></script><!-- модуль пиксельного ластика (нет в основной сборке) -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
